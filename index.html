<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grotte Sombre - Exploration</title>
    <!-- Google Fonts - Thème Fantastique -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: white;
        font-family: 'Cinzel', serif;
        touch-action: none;
      }
      #renderDiv {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        z-index: 10;
      }
      #inventory {
        position: absolute;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        background: rgba(0,0,0,0.6);
        padding: 10px;
        border-radius: 12px;
        border: 2px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(5px);
        z-index: 10;
      }
      .fragment-slot {
        width: 45px;
        height: 45px;
        border: 2px dashed rgba(255,255,255,0.2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 10px;
        opacity: 0.2;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .fragment-slot.collected {
        opacity: 1;
        border-style: solid;
        transform: scale(1.1);
        box-shadow: 0 0 20px currentColor;
      }
      #joystick-container {
        position: absolute;
        bottom: 30px;
        left: 30px;
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        display: none;
        z-index: 50;
        touch-action: none;
      }
      #joystick-knob {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 50px;
        height: 50px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 4px;
        background: rgba(255,255,255,0.4);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 5;
      }
      @media (pointer: coarse) {
        #joystick-container { display: block; }
      }
    </style>
</head>
<body>
    <div id="renderDiv"></div>
    <div id="ui">
        <h2 id="status">Trouvez les 4 fragments</h2>
    </div>
    <div id="inventory">
        <div id="slot-red" class="fragment-slot" style="color: #ff3333;">R</div>
        <div id="slot-green" class="fragment-slot" style="color: #33ff33;">V</div>
        <div id="slot-blue" class="fragment-slot" style="color: #3333ff;">B</div>
        <div id="slot-yellow" class="fragment-slot" style="color: #ffff33;">J</div>
    </div>
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="crosshair"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
